resources:
  jobs:
    develop_eggs:
      name: develop_eggs
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            spark_version: 15.3.x-scala2.12
            node_type_id: m4.large
            num_workers: 0
            runtime_engine: STANDARD
            data_security_mode: LEGACY_SINGLE_USER
            spark_env_vars:
              KEDRO_LOGGING_CONFIG: /dbfs/FileStore/david/conf/logging.yml
              PROVIDER_USERNAME: username
              PROVIDER_PASSWORD: password
            enable_elastic_disk: true
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*,4]
            custom_tags:
              ResourceClass: SingleNode
      tasks:
        - task_key: make_predictions
          job_cluster_key: default
          depends_on:
            - task_key: split
          python_wheel_task:
            package_name: develop_eggs
            entry_point: develop-eggs
            parameters:
              - --nodes
              - make_predictions
              - --conf-source
              - /${workspace.file_path}/conf
              - --env
              - local
          libraries:
            - whl: ../dist/*.whl
        - task_key: report_accuracy
          job_cluster_key: default
          depends_on:
            - task_key: make_predictions
            - task_key: split
          python_wheel_task:
            package_name: develop_eggs
            entry_point: develop-eggs
            parameters:
              - --nodes
              - report_accuracy
              - --conf-source
              - /${workspace.file_path}/conf
              - --env
              - local
          libraries:
            - whl: ../dist/*.whl
        - task_key: split
          job_cluster_key: default
          python_wheel_task:
            package_name: develop_eggs
            entry_point: develop-eggs
            parameters:
              - --nodes
              - split
              - --conf-source
              - /${workspace.file_path}/conf
              - --env
              - local
          libraries:
            - whl: ../dist/*.whl
